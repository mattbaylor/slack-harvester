<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        width: 340px;
        padding: 16px;
        background: #0f172a;
        color: #e2e8f0;
        font-size: 13px;
      }
      h1 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #f8fafc; }
      .status-bar {
        display: flex; align-items: center; gap: 8px;
        padding: 8px 12px; border-radius: 8px; margin-bottom: 12px; font-weight: 500;
      }
      .status-bar.ok { background: #064e3b; color: #6ee7b7; }
      .status-bar.warn { background: #7c2d12; color: #fdba74; }
      .status-bar.out { background: #450a0a; color: #fca5a5; }
      .status-bar.noconfig { background: #78350f; color: #fde68a; }
      .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
      .dot.green { background: #22c55e; }
      .dot.yellow { background: #f59e0b; }
      .dot.red { background: #ef4444; }
      .meta { font-size: 11px; color: #64748b; margin-bottom: 8px; }
      .meta span { color: #94a3b8; }
      .push-status { font-size: 11px; padding: 6px 10px; border-radius: 6px; margin-bottom: 12px; }
      .push-status.ok { background: #064e3b; color: #6ee7b7; }
      .push-status.bad { background: #1e293b; color: #fca5a5; }
      .logout-note { font-size: 11px; padding: 8px 10px; border-radius: 6px;
        margin-bottom: 12px; background: #450a0a; color: #fca5a5; display: none; }
      button {
        width: 100%; padding: 10px; border: none; border-radius: 8px;
        background: #3b82f6; color: white; font-weight: 600; font-size: 13px; cursor: pointer;
      }
      button:hover { background: #2563eb; }
      button:disabled { background: #334155; color: #64748b; cursor: default; }
    </style>
  </head>
  <body>
    <h1>Slack Harvester Creds</h1>

    <div id="statusBar" class="status-bar warn">
      <span class="dot yellow" id="statusDot"></span>
      <span id="statusText">Checking...</span>
    </div>

    <div id="logoutNote" class="logout-note">
      You appear to be logged out of Slack web. Re-sign-in needed — capture is
      paused until you do.
    </div>

    <div class="meta">Last successful push: <span id="lastPush">never</span></div>
    <div class="meta">Harvester: <span id="harvester">--</span></div>

    <div id="pushStatus" class="push-status bad">Push status: unknown</div>

    <button id="pushNow">Push now</button>

    <script src="popup.js"></script>
  </body>
</html>
